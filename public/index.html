<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>BattleMech Search</title>
  <meta name="description" content="BattleMech Search">
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <div class="searchapp">

    <div class="searchform gradient dropshadow">
      <h1>BattleMech Search</h1>
      <form id="filterForm">
        <div class="columns">

          <div class="column">
            <label>Name:</label>
            <input type="text" name="nameSearch" placeholder="e.g. Atlas">
          </div>
          
          <div class="column">
            <label>Class:</label>
            <input type="text" name="classSearch" placeholder="e.g. Atlas">
          </div>

          <div class="column">
            <label>Size (min/max):</label>
            <input type="number" name="minSize" min="1" max="4" placeholder="Min">
            <input type="number" name="maxSize" min="1" max="4" placeholder="Max">
          </div>

          <div class="column">
            <label>Intro (min/max):</label>
            <input type="number" name="minIntro" min="1" placeholder="Min">
            <input type="number" name="maxIntro" min="1" placeholder="Max">
          </div>

          <div class="column">
            <label>PV (min/max):</label>
            <input type="number" name="minPV" min="1" placeholder="Min">
            <input type="number" name="maxPV" min="1" placeholder="Max">
          </div>

          <div class="column">
            <label>Sort by:</label>
              <select name="sortBy">
                <option value="">--</option>
                <option value="name">Name</option>
                <option value="size">Size</option>
                <option value="armor">Armor</option>
                <option value="structure">Structure</option>
                <option value="overheat">Overheat</option>
                <option value="intro">Intro</option>
                <option value="pv">PV</option>
              </select>
              <select name="sortDir">
                <option value="asc">ASC</option>
                <option value="desc">DESC</option>
              </select>
          </div>

          <div class="column">
            <label>&nbsp;</label>
            <button type="submit">Search</button>
          </div>

        </div>
        
      </form>
    </div>

    <div class="searchresults">
      <table id="resultsTable">
        <thead class="dropshadow">
          <tr>
            <th>Name</th>
            <th>Class</th>
            <th class="number">Size</th>
            <th class="number">Armor</th>
            <th class="number">Structure</th>
            <th class="number">S</th>
            <th class="number">M</th>
            <th class="number">L</th>
            <th class="number">E</th>
            <th class="number">OV</th>
            <th class="number">Intro</th>
            <th class="number">PV</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="footer dropshadow-reverse"><p>Made by <a href="https://fransvanberendonk.com" target="_blank">Frans van Berendonk</a> | 2026</p></div>
    </div>

  </div>

  <script>
    const searchform = document.querySelector('.searchform');
    const searchresults = document.querySelector('.searchresults');
    const form = document.getElementById("filterForm");
    const tbody = document.querySelector("#resultsTable tbody");

    searchresults.style.display = 'none';

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const filters = Object.fromEntries(formData.entries());

      // Convert numeric inputs
      ["minSize", "maxSize", "minIntro", "maxIntro"].forEach(k => {
        if (filters[k]) filters[k] = Number(filters[k]);
      });

      try {
        const res = await fetch("/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(filters)
        });

        const data = await res.json();

        // Clear old results
        tbody.innerHTML = "";

        // Populate table
        data.forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><a href="${row.mul}" target="_blank">${row.name}</a></td>
            <td><a href="${row.sarna}" target="_blank">${row.class}</a></td>
            <td class="number">${row.size}</td>
            <td class="number">${row.armor}</td>
            <td class="number">${row.structure}</td>
            <td class="number damage">${row.damageS}</td>
            <td class="number damage">${row.damageM}</td>
            <td class="number damage">${row.damageL}</td>
            <td class="number damage">${row.damageE}</td>
            <td class="number overheat">${row.overheat}</td>
            <td class="number">${row.intro}</td>
            <td class="number">${row.pv}</td>
          `;
          tbody.appendChild(tr);
        });

        searchresults.style.display = 'block';

        updateTop();

      } catch (err) {
        console.error(err);
      }
    });

    /* Since we can't do sticky inpure CSS the way we want, we'll use some JS. */
    function updateTop() {
      const height =  window.innerHeight - searchform.offsetHeight;
      searchresults.style.height = (height + 'px');
    }
    window.addEventListener('resize', updateTop);
    updateTop();
  </script>
</body>
</html>
